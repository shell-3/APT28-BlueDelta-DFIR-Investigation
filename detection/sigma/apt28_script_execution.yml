title: APT28 BlueDelta - Malicious Script Execution from Non-Standard Path (T1204.002)
id: c8d4e5f3-0a7f-6b1c-d4e9-3f5a8b0c1d6e
status: stable
description: |
  Detects execution of Python scripts from non-standard directories, consistent
  with APT28 malicious file execution as observed in Campaign BLUEDELTA_20260607_072802.
  
  Confirmed event: python.exe (PID 2156, PPID=cmd.exe/PowerShell) executed
  NulltackKatz.py from C:\NulltackLab\ at 07:28:05 local time. The script
  immediately triggered the discovery, privilege escalation, and credential
  dumping chain — completing in 40 seconds.
  
  Detection approach: python.exe should only execute from known, approved
  directories (site-packages, virtualenvs, known project paths). Execution
  from user-writable directories (Desktop, Downloads, Temp, custom tool dirs)
  is a high-confidence malicious execution indicator.

references:
  - https://attack.mitre.org/techniques/T1204/002/
  - https://github.com/adhamalhamidi/APT28-BlueDelta-DFIR-Investigation

author: Adham Alhamidi (Purple Team, Operation BlueBalance)
date: 2026-06-07
modified: 2026-06-07

tags:
  - attack.execution
  - attack.t1204.002
  - attack.t1566.001
  - apt28
  - bluedelta
  - fancy_bear
  - campaign.bluedelta_20260607_072802

logsource:
  product: windows
  category: process_creation

detection:
  selection_python_execution:
    Image|endswith:
      - '\python.exe'
      - '\python3.exe'
      - '\pythonw.exe'
    CommandLine|contains:
      - '.py'
  filter_legitimate_paths:
    # Exclude known-good Python execution paths
    CommandLine|contains:
      - 'C:\Python'
      - 'C:\Program Files\Python'
      - 'C:\Program Files (x86)\Python'
      - 'C:\Users\*\AppData\Local\Programs\Python'
      - '\site-packages\'
      - '\Lib\site-packages\'
      - 'pip'
      - 'conda'
      - 'jupyter'
      - 'pytest'
  selection_suspicious_paths:
    # Flag execution from user-writable suspicious directories
    CommandLine|contains:
      - 'NulltackLab'
      - '\Desktop\'
      - '\Downloads\'
      - '\Temp\'
      - '\AppData\Local\Temp'
      - '\Public\'
      - 'C:\Temp'
      - 'C:\Tools'
  condition: selection_python_execution and (not filter_legitimate_paths or selection_suspicious_paths)

falsepositives:
  - Developer workstations with custom Python project directories
  - Legitimate automation scripts in custom tool directories
  - Update these filters based on your environment's approved Python usage

level: medium

fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
  - IntegrityLevel
  - ProcessId
  - ParentProcessId
  - Hashes

# ============================================================
# MIMIKATZ EXECUTION CHAIN — HIGHEST PRIORITY VARIANT
# ============================================================
# This combined rule is most powerful when the script execution
# is followed by mimikatz execution from the same parent shell:
#
# Chain: email attachment → python.exe → mimikatz.exe (child or sibling)
#
# Splunk:
#   index=sysmon EventCode=1 Image="*python.exe"
#     (CommandLine="*NulltackKatz*" OR CommandLine="*sekurlsa*")
#   | table _time, Image, CommandLine, ParentImage, User, IntegrityLevel, Hashes
#
# SHA256 of confirmed mimikatz binary (all instances in campaign):
# 92804FAAAB2175DC501D73E814663058C78C0A042675A8937266357BCFB96C50
#
# KQL (Sentinel):
#   DeviceProcessEvents
#   | where FileName == "python.exe"
#   | where ProcessCommandLine contains ".py"
#   | where not (ProcessCommandLine contains "site-packages" 
#                or FolderPath contains "Program Files")
#   | project Timestamp, DeviceName, AccountName, ProcessCommandLine,
#             InitiatingProcessFileName, InitiatingProcessCommandLine
# ============================================================
